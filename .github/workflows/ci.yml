name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: asset_tracker
          POSTGRES_USER: asset_tracker
          POSTGRES_PASSWORD: asset_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U asset_tracker -d asset_tracker"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      ASSET_TRACKER_DATABASE_URL: postgresql+psycopg://asset_tracker:asset_tracker@127.0.0.1:5432/asset_tracker
      ASSET_TRACKER_REDIS_URL: redis://127.0.0.1:6379/0
      ASSET_TRACKER_TEST_DATABASE_URL: postgresql+psycopg://asset_tracker:asset_tracker@127.0.0.1:5432/asset_tracker_test
      ASSET_TRACKER_TEST_DATABASE_ADMIN_URL: postgresql+psycopg://asset_tracker:asset_tracker@127.0.0.1:5432/postgres
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --frozen
      - run: uv run python -m compileall app
      - run: uv run ruff check app tests ../scripts
      - run: uv run python ../scripts/check_backend_decimal_guard.py
      - run: uv run python ../scripts/check_pyright_ratchet.py --baseline 293 -- app tests
      - run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
