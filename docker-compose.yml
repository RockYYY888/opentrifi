services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${ASSET_TRACKER_POSTGRES_DB:-asset_tracker}
      POSTGRES_USER: ${ASSET_TRACKER_POSTGRES_USER:-asset_tracker}
      POSTGRES_PASSWORD: ${ASSET_TRACKER_POSTGRES_PASSWORD:-asset_tracker}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${ASSET_TRACKER_POSTGRES_USER:-asset_tracker} -d ${ASSET_TRACKER_POSTGRES_DB:-asset_tracker}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "127.0.0.1:${ASSET_TRACKER_HOST_POSTGRES_PORT:-5433}:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "127.0.0.1:${ASSET_TRACKER_HOST_REDIS_PORT:-6380}:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    environment:
      ASSET_TRACKER_APP_ENV: ${ASSET_TRACKER_APP_ENV:-development}
      ASSET_TRACKER_DATABASE_URL: ${ASSET_TRACKER_DATABASE_URL:-postgresql+psycopg://${ASSET_TRACKER_POSTGRES_USER:-asset_tracker}:${ASSET_TRACKER_POSTGRES_PASSWORD:-asset_tracker}@postgres:5432/${ASSET_TRACKER_POSTGRES_DB:-asset_tracker}}
      ASSET_TRACKER_PUBLIC_ORIGIN: ${ASSET_TRACKER_PUBLIC_ORIGIN}
      ASSET_TRACKER_ALLOWED_ORIGINS: ${ASSET_TRACKER_ALLOWED_ORIGINS:-}
      ASSET_TRACKER_ALLOWED_HOSTS: ${ASSET_TRACKER_ALLOWED_HOSTS:-}
      ASSET_TRACKER_REDIS_URL: ${ASSET_TRACKER_REDIS_URL:-redis://redis:6379/0}
      ASSET_TRACKER_SESSION_SECRET: ${ASSET_TRACKER_SESSION_SECRET}
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.worker"]
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASSET_TRACKER_APP_ENV: ${ASSET_TRACKER_APP_ENV:-development}
      ASSET_TRACKER_DATABASE_URL: ${ASSET_TRACKER_DATABASE_URL:-postgresql+psycopg://${ASSET_TRACKER_POSTGRES_USER:-asset_tracker}:${ASSET_TRACKER_POSTGRES_PASSWORD:-asset_tracker}@postgres:5432/${ASSET_TRACKER_POSTGRES_DB:-asset_tracker}}
      ASSET_TRACKER_PUBLIC_ORIGIN: ${ASSET_TRACKER_PUBLIC_ORIGIN}
      ASSET_TRACKER_ALLOWED_ORIGINS: ${ASSET_TRACKER_ALLOWED_ORIGINS:-}
      ASSET_TRACKER_ALLOWED_HOSTS: ${ASSET_TRACKER_ALLOWED_HOSTS:-}
      ASSET_TRACKER_REDIS_URL: ${ASSET_TRACKER_REDIS_URL:-redis://redis:6379/0}
      ASSET_TRACKER_SESSION_SECRET: ${ASSET_TRACKER_SESSION_SECRET}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
        VITE_ENABLE_PWA: "true"
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    environment:
      ASSET_TRACKER_DOMAIN: ${ASSET_TRACKER_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/letsencrypt:/etc/letsencrypt
      - ./nginx/certbot:/var/www/certbot
    restart: unless-stopped

volumes:
  postgres_data:
