<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Hermes Know</title>
		<style>
			:root {
				color-scheme: dark;
				font-family:
					"SF Pro Display",
					"Helvetica Neue",
					Arial,
					sans-serif;
				background: #07111f;
				color: #e8f3ff;
			}

			* {
				box-sizing: border-box;
			}

			body {
				display: grid;
				min-height: 100vh;
				margin: 0;
				place-items: center;
				background:
					radial-gradient(circle at 22% 18%, rgba(36, 179, 217, 0.24), transparent 34rem),
					radial-gradient(circle at 82% 82%, rgba(240, 92, 145, 0.18), transparent 28rem),
					linear-gradient(135deg, #07111f 0%, #0d1a2b 100%);
			}

			main {
				width: min(42rem, calc(100vw - 2rem));
				padding: clamp(2rem, 7vw, 4rem);
				border: 1px solid rgba(116, 202, 232, 0.26);
				border-radius: 2rem;
				background: rgba(8, 18, 32, 0.78);
				box-shadow: 0 2rem 5rem rgba(0, 0, 0, 0.38);
			}

			p,
			h1 {
				margin: 0;
			}

			.kicker {
				margin-bottom: 1rem;
				color: #5fe3ff;
				font-size: 0.78rem;
				font-weight: 700;
				letter-spacing: 0.32em;
				text-transform: uppercase;
			}

			h1 {
				font-size: clamp(2.6rem, 9vw, 5.4rem);
				line-height: 0.92;
				letter-spacing: -0.07em;
			}

			.copy {
				max-width: 31rem;
				margin-top: 1.5rem;
				color: #a8bad2;
				font-size: clamp(1rem, 2.5vw, 1.2rem);
				line-height: 1.75;
			}

			.status {
				display: inline-flex;
				align-items: center;
				gap: 0.65rem;
				margin-top: 2rem;
				padding: 0.78rem 1rem;
				border: 1px solid rgba(95, 227, 255, 0.32);
				border-radius: 999px;
				background: rgba(14, 47, 67, 0.66);
				color: #dff8ff;
				font-size: 0.92rem;
				font-weight: 700;
			}

			.status::before {
				width: 0.62rem;
				height: 0.62rem;
				border-radius: 50%;
				background: #5fe3ff;
				box-shadow: 0 0 1.2rem rgba(95, 227, 255, 0.95);
				content: "";
			}
		</style>
	</head>
	<body>
		<main>
			<p class="kicker">Reserved Endpoint</p>
			<h1>Hermes Know</h1>
			<p class="copy">
				This domain is reserved for a future service. The endpoint is online, but no
				application has been deployed here yet.
			</p>
			<p class="status">Placeholder page active</p>
		</main>
	</body>
</html>
